<html lang="en">

<title>Replay 2026 — Field Guide</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e2ddd6;
    --border-strong: #c8c2b8;
    --text: #1a1816;
    --text-muted: #6b6560;
    --text-hint: #9e9890;
    --accent: #2d5be3;
    --accent-bg: #eef1fd;
    --accent-text: #1a3aad;
    --green: #1e7c4a;
    --green-bg: #e8f5ee;
    --amber: #7a4f0d;
    --amber-bg: #fdf3e3;
    --pink: #8c2a52;
    --pink-bg: #fcedf4;
    --gray: #5a5550;
    --gray-bg: #eeebe6;
    --star: #d4900a;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .page-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-hint);
    font-family: 'DM Mono', monospace;
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .filter-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  .theme-section { margin-bottom: 2.5rem; }

  .theme-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-hint);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.125rem;
    cursor: pointer;
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  .card:hover { border-color: var(--border-strong); }
  .card.expanded { border-color: var(--text); }

  .card-header { display: flex; align-items: flex-start; gap: 8px; }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
    flex: 1;
  }

  .star { color: var(--star); font-size: 13px; }

  .chevron {
    font-size: 10px;
    color: var(--text-hint);
    transition: transform 0.15s;
    margin-top: 3px;
    flex-shrink: 0;
  }
  .card.expanded .chevron { transform: rotate(180deg); }

  .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

  .badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 400;
  }

  .badge-ga { background: var(--green-bg); color: var(--green); }
  .badge-preview { background: var(--amber-bg); color: var(--amber); }
  .badge-prerelease { background: var(--pink-bg); color: var(--pink); }
  .badge-demo { background: var(--gray-bg); color: var(--gray); }
  .badge-keynote { background: var(--accent-bg); color: var(--accent-text); }

  .card-summary {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .card-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card.expanded .card-detail { display: block; }

  .detail-section { margin-bottom: 12px; }

  .detail-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-hint);
    margin-bottom: 4px;
  }

  .detail-text { font-size: 13px; color: var(--text); line-height: 1.5; }

  .talk-track {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--border-strong);
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    font-style: italic;
  }

  .faq-item { margin-bottom: 8px; }

  .faq-q {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent-text);
    margin-bottom: 2px;
  }

  .faq-a { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    text-decoration: none;
    margin-top: 4px;
  }
  .card-link:hover { text-decoration: underline; }

  .empty {
    font-size: 14px;
    color: var(--text-hint);
    padding: 2rem 0;
    font-family: 'DM Mono', monospace;
  }

  @media (max-width: 600px) {
    .page-header { padding: 1.25rem 1rem 1rem; position: static; }
    .main { padding: 1.25rem 1rem; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>

    summary:"Automated user provisioning/deprovisioning and group management via your IdP. Works like any enterprise SaaS tool.",
    talkTrack:"\"SCIM is now GA — your IdP can automatically provision and deprovision Temporal Cloud users, just like any other enterprise SaaS tool.\"",
    whoCaresAbout:"IT admins; security/compliance teams; enterprise procurement",
    faqs:[
      {q:"Which IdPs are supported?", a:"Any SCIM 2.0-compatible IdP — Okta, Azure AD, etc."},
      {q:"What about SSO?", a:"SCIM handles provisioning. SSO/SAML for authentication is separate — both are available."}
    ],
    notionUrl:null,
    docsUrl:"https://docs.temporal.io/cloud/scim"
  }
];

function getBadgeClass(s) {
  return {ga:'badge-ga',preview:'badge-preview',prerelease:'badge-prerelease',demo:'badge-demo'}[s]||'badge-demo';
}
function getStatusLabel(s) {
  return {ga:'GA',preview:'Public preview',prerelease:'Pre-release',demo:'Demo ready'}[s]||s;
}

let activeFilter = 'all';

function filter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleCard(id) {
  document.getElementById('card-'+id).classList.toggle('expanded');
}

function render() {
  const container = document.getElementById('content');
  const visible = features.filter(f => {
    if (activeFilter === 'ai') return f.theme === 'ai';
    if (activeFilter === 'ops') return f.theme === 'ops';
    if (activeFilter === 'keynote') return f.keynote;
    if (activeFilter === 'ga') return f.status === 'ga';
    return true;
  });

  if (!visible.length) {
    container.innerHTML = '<p class="empty">No features match this filter.</p>';
    return;
  }

  let html = '';
  let lastTheme = null;
  let openSection = false;

  visible.forEach((f, i) => {
    const idx = features.indexOf(f);
    if (f.themeLabel !== lastTheme) {
      if (openSection) html += '</div></div>';
      html += `<div class="theme-section"><div class="theme-label">${f.themeLabel}</div><div class="cards">`;
      lastTheme = f.themeLabel;
      openSection = true;
    }

    const faqsHtml = f.faqs.map(faq =>
      `<div class="faq-item"><div class="faq-q">Q: ${faq.q}</div><div class="faq-a">${faq.a}</div></div>`
    ).join('');

    const linksHtml = [
      f.docsUrl ? `<a class="card-link" href="${f.docsUrl}" target="_blank">Public docs &rarr;</a>` : '',
      f.notionUrl ? `<a class="card-link" href="${f.notionUrl}" target="_blank">Full brief in Notion &rarr;</a>` : ''
    ].filter(Boolean).join('');

    html += `
      <div class="card" id="card-${idx}" onclick="toggleCard(${idx})">
        <div class="card-header">
          <div style="flex:1">
            <div class="card-name">${f.keynote ? '<span class="star">&#9733;</span> ' : ''}${f.name}</div>
            <div class="badges">
              <span class="badge ${getBadgeClass(f.status)}">${getStatusLabel(f.status)}</span>
              ${f.keynote ? '<span class="badge badge-keynote">Keynote</span>' : ''}
            </div>
          </div>
          <span class="chevron">&#9660;</span>
        </div>
        <div class="card-summary">${f.summary}</div>
        <div class="card-detail">
          <div class="detail-section">
            <div class="detail-label">Talk track</div>
            <div class="talk-track">${f.talkTrack}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Who cares</div>
            <div class="detail-text">${f.whoCaresAbout}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Customer FAQs</div>
            ${faqsHtml}
          </div>
          ${linksHtml ? `<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:4px">${linksHtml}</div>` : ''}
        </div>
      </div>`;
  });

  if (openSection) html += '</div></div>';
  container.innerHTML = html;
}

render();
</script>
</body>
</html>
